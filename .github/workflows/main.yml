name: Compile LaTeX

on:
  push:
    paths:
      - 'latex/**/*.tex'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra texlive-fonts-recommended texlive-lang-french

      - name: Set up Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compile all LaTeX files
        run: |
          find latex -name "*.tex" | while read -r file; do
            latexmk -pdf -interaction=nonstopmode -halt-on-error "$file"
          done

      - name: Copy PDFs to pdfs/
        run: |
          find latex -name "*.tex" | while read -r file; do
            pdf="${file%.tex}.pdf"
            rel="${pdf#latex/}"
            dest="pdfs/$rel"
            mkdir -p "$(dirname "$dest")"
            if [ -f "$pdf" ]; then
              cp "$pdf" "$dest"
            fi
          done

      - name: Commit generated PDFs
        run: |
          git add pdfs
          if git diff --cached --quiet; then
            echo "No PDF changes to commit."
          else
            git commit -m "Auto-build PDFs"
            git push
          fi

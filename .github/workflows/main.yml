name: Compile LaTeX

on:
  push:
    paths:
      - 'latex/**/*.tex'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra texlive-fonts-recommended texlive-lang-french

      - name: Set up Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect changed LaTeX files
        id: changed
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            find latex -type f -name "*.tex" | sort > changed_tex.txt
          else
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep '^latex/.*\.tex$' | sort -u > changed_tex.txt || true
          fi

          echo "Fichiers détectés :"
          cat changed_tex.txt || true

          if [ -s changed_tex.txt ]; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compile changed LaTeX files
        if: steps.changed.outputs.has_files == 'true'
        shell: bash
        run: |
          while IFS= read -r file; do
            echo "Compilation de $file"
            latexmk -lualatex -interaction=nonstopmode -halt-on-error "$file"
          done < changed_tex.txt

      - name: Copy PDFs to pdfs/
        if: steps.changed.outputs.has_files == 'true'
        shell: bash
        run: |
          while IFS= read -r file; do
            pdf="${file%.tex}.pdf"
            rel="${pdf#latex/}"
            dest="pdfs/$rel"
            mkdir -p "$(dirname "$dest")"
            if [ -f "$pdf" ]; then
              cp "$pdf" "$dest"
              echo "Copié : $pdf -> $dest"
            fi
          done < changed_tex.txt

      - name: Generate pdf index
        shell: bash
        run: |
          python3 <<'PY'
          import json, os

          root = "pdfs"
          items = []

          for dirpath, _, filenames in os.walk(root):
              for filename in filenames:
                  if not filename.lower().endswith(".pdf"):
                      continue
                  rel = os.path.join(dirpath, filename).replace("\\", "/")
                  parts = rel.split("/")
                  items.append({
                      "path": rel,
                      "filename": filename,
                      "slug": os.path.splitext(filename)[0],
                      "niveau": parts[1] if len(parts) > 1 else "",
                      "classe": parts[2] if len(parts) > 2 else "",
                      "matiere": parts[3] if len(parts) > 3 else ""
                  })

          items.sort(key=lambda x: x["path"].lower())

          os.makedirs(root, exist_ok=True)
          with open(os.path.join(root, "index.json"), "w", encoding="utf-8") as f:
              json.dump(items, f, ensure_ascii=False, indent=2)

          print(f"{len(items)} PDF indexés")
          PY

      - name: Commit generated PDFs and index
        shell: bash
        run: |
          git add pdfs
          if git diff --cached --quiet; then
            echo "Aucun changement à commit."
          else
            git commit -m "Auto-build PDFs and index"
            git push
          fi
